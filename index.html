<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

.card{
  max-width:600px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4fd8;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title"></h2>
  <p id="text"></p>
  <button onclick="next()">Suivant</button>
</div>

<script>

let page = 0;

const pages = [
{
title:"J'avais un petit truc à te dire",
text:"Ça fait un moment que tu m'intéresses. Je sais que je peux paraître insistant, mais c'est parce que tu as l'air vraiment intéressante."
},
{
title:"Peut-être pas un hasard…",
text:"Si je t'ai croisée à Orléans alors que tu ne viens pas souvent, c’est peut-être pas pour rien. Peut-être que c’est le destin."
},
{
title:"Rien n'arrive au hasard",
text:"Malgré la différence d'âge et la distance, ce ne sont pas des freins pour moi. Quand on veut quelque chose, on trouve des solutions."
},
{
title:"Alors voilà",
text:"J’ai envie d’apprendre à te connaître vraiment. Je suis prêt à m’engager dans quelque chose de concret."
}
];

function show(){
  document.getElementById("title").innerText = pages[page].title;
  document.getElementById("text").innerText = pages[page].text;
}

function next(){
  page++;
  if(page < pages.length){
    show();
  } else {
    document.body.innerHTML = `
      <div style="text-align:center">
        <h2>À toi de jouer 👀</h2>
        <br>
        <a href="https://wa.me/447488813781?text=Je%20viens%20de%20voir%20ton%20site%20👀">
          <button style="background:#25D366">💬 M'écrire sur WhatsApp</button>
        </a>
      </div>
    `;
  }
}

show();

</script>

</body>
</html>
