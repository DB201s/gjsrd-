<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un message pour toi</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  overflow:hidden;
}

.card{
  width:90%;
  max-width:600px;
  background:#222;
  padding:40px;
  border-radius:20px;
  text-align:center;
  transition:opacity .3s ease;
}

h2{ margin-top:0; }

button{
  margin-top:25px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4fd8;
  color:white;
  font-weight:bold;
  cursor:pointer;
  display:none;
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
}

.floating{
  position:absolute;
  top:-50px;
  font-size:20px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title"></h2>
  <p id="text"></p>
  <button id="nextBtn">Suivant</button>
</div>

<script>

let page = 0;
let animToken = 0;

const pages = [
{
title:"J'avais un petit truc à te dire",
text:`Ça fait un moment que tu m'intéresses.
Je sais que tu vois bien que je peux être insistant, parfois même un peu relou…
Mais si je le suis, c'est parce que tu as l'air vraiment intéressante.`
},
{
title:"Peut-être pas un hasard…",
text:`Si je t'ai croisée à Orléans alors que tu ne viens pas souvent,
c’est peut-être pas pour rien.
Peut-être que c’est simplement le destin.`
},
{
title:"Rien n'arrive au hasard",
text:`Malgré la différence d'âge, malgré la distance,
pour moi ce ne sont pas des freins.
Quand on veut vraiment quelque chose, on trouve des solutions.`
},
{
title:"Alors voilà",
text:`J’ai envie d’apprendre à te connaître vraiment.
Je suis motivé, sincère, et prêt à m’engager dans quelque chose de concret.
Même si je suis un peu plus jeune, ça ne change rien à ma détermination.`
}
];

const titleEl = document.getElementById("title");
const textEl = document.getElementById("text");
const btn = document.getElementById("nextBtn");

btn.addEventListener("click", nextPage);

function typeWriter(element, text, speed, token, callback){
  element.innerHTML = "";
  let i = 0;

  function typing(){
    if(token !== animToken) return;

    if(i < text.length){
      const char = text.charAt(i);
      element.innerHTML += char === "\n" ? "<br>" : char;
      i++;
      setTimeout(typing, speed);
    } else {
      if(callback) callback();
    }
  }
  typing();
}

function loadPage(){
  animToken++;
  const token = animToken;

  btn.style.display = "none";

  typeWriter(titleEl, pages[page].title, 40, token, () => {
    typeWriter(textEl, pages[page].text, 25, token, () => {
      if(token === animToken){
        btn.style.display = "inline-block";
      }
    });
  });
}

function nextPage(){
  page++;
  if(page < pages.length){
    loadPage();
  } else {
    titleEl.innerHTML = "À toi de jouer 👀";
    textEl.innerHTML = `
      Si tu es arrivée jusqu'ici…
      <br><br>
      <a href="https://wa.me/447488813781?text=Je%20viens%20de%20voir%20ton%20site%20👀" target="_blank">
        <button style="display:inline-block;background:#25D366;">
          💬 M'écrire sur WhatsApp
        </button>
      </a>
    `;
    btn.style.display = "none";
  }
}

/* Coeurs et roses */
function createFloating(){
  const el = document.createElement("div");
  el.className = "floating";
  el.style.left = Math.random()*100 + "vw";
  el.style.animationDuration = (5 + Math.random()*5) + "s";
  el.textContent = Math.random() > 0.5 ? "❤️" : "🌹";
  document.body.appendChild(el);
  setTimeout(()=> el.remove(), 10000);
}

setInterval(createFloating, 400);

loadPage();

</script>

</body>
</html>
