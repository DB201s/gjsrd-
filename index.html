<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Un message pour toi</title>

  <style>
    :root{
      --accent:#ff4fd8;
      --wa:#25D366;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#fff;
      overflow:hidden;

      /* Fallback si l'image ne charge pas */
      background:
        radial-gradient(900px 600px at 15% 15%, rgba(255,79,216,.22), transparent 60%),
        radial-gradient(900px 600px at 80% 70%, rgba(124,92,255,.22), transparent 60%),
        linear-gradient(180deg, #0b1020, #1a0b2a);
    }

    /* Image de fond (si dispo) */
    .bg{
      position:fixed;
      inset:0;
      background:url("background.jpg") center/cover no-repeat;
      z-index:0;
      transform:scale(1.02);
    }

    /* Overlay sombre + flou pour lisibilité */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      backdrop-filter: blur(7px);
      z-index:1;
    }

    .card{
      position:relative;
      z-index:2;
      width:min(600px, 92vw);
      background:rgba(0,0,0,0.65);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:20px;
      padding:38px 34px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      transition:opacity .25s ease;
    }

    h2{ margin:0 0 12px 0; font-size:22px; }
    p{ margin:0; line-height:1.65; opacity:.95; }

    .btn{
      margin-top:22px;
      padding:12px 24px;
      border:0;
      border-radius:30px;
      background:var(--accent);
      color:white;
      font-weight:700;
      cursor:pointer;
      display:none;
      transition:.2s transform;
    }
    .btn:hover{ transform:scale(1.06); }

    .btn-wa{
      background:var(--wa);
      display:inline-block !important;
      margin-top:0;
    }

    /* Coeurs + roses */
    .floating{
      position:fixed;
      top:-50px;
      font-size:20px;
      animation:fall linear forwards;
      z-index:1; /* derrière la card, devant le fond */
      opacity:0.85;
      pointer-events:none;
    }
    @keyframes fall{
      to{ transform:translateY(110vh) rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- fond + overlay -->
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- contenu -->
  <div class="card" id="card">
    <h2 id="title"></h2>
    <p id="text"></p>
    <button class="btn" id="nextBtn" type="button">Suivant</button>
  </div>

  <script>
    let page = 0;
    let animToken = 0;

    const pages = [
      {
        title:"J'avais un petit truc à te dire",
        text:`Ça fait un moment que tu m'intéresses.
Je sais que tu vois bien que je peux être insistant, parfois même un peu relou…
Mais si je le suis, c'est parce que tu as l'air vraiment intéressante.`
      },
      {
        title:"Peut-être pas un hasard…",
        text:`Si je t'ai croisée à Orléans alors que tu ne viens pas souvent,
c’est peut-être pas pour rien.
Peut-être que c’est simplement le destin.`
      },
      {
        title:"Rien n'arrive au hasard",
        text:`Malgré la différence d'âge, malgré la distance,
pour moi ce ne sont pas des freins.
Quand on veut vraiment quelque chose, on trouve des solutions.`
      },
      {
        title:"Alors voilà",
        text:`J’ai envie d’apprendre à te connaître vraiment.
Je suis motivé, sincère, et prêt à m’engager dans quelque chose de concret.
Même si je suis un peu plus jeune, ça ne change rien à ma détermination.`
      }
    ];

    const card = document.getElementById("card");
    const titleEl = document.getElementById("title");
    const textEl  = document.getElementById("text");
    const btn     = document.getElementById("nextBtn");

    btn.addEventListener("click", nextPage);

    function typeWriter(el, text, speed, token, done){
      el.innerHTML = "";
      let i = 0;

      function step(){
        if(token !== animToken) return; // stop si on change de page
        if(i < text.length){
          const ch = text.charAt(i);
          el.innerHTML += (ch === "\n") ? "<br>" : ch;
          i++;
          setTimeout(step, speed);
        } else {
          if(done) done();
        }
      }
      step();
    }

    function loadPage(){
      animToken++;
      const token = animToken;

      btn.style.display = "none";
      card.style.opacity = 0;

      setTimeout(() => {
        // purge total (plus aucun ancien texte)
        titleEl.innerHTML = "";
        textEl.innerHTML = "";

        card.style.opacity = 1;

        typeWriter(titleEl, pages[page].title, 35, token, () => {
          typeWriter(textEl, pages[page].text, 20, token, () => {
            if(token === animToken) btn.style.display = "inline-block";
          });
        });
      }, 260);
    }

    function nextPage(){
      page++;
      if(page < pages.length){
        loadPage();
        return;
      }

      // fin WhatsApp
      animToken++;
      btn.style.display = "none";
      card.style.opacity = 0;

      setTimeout(() => {
        titleEl.innerHTML = "À toi de jouer 👀";
        textEl.innerHTML = `
          Si tu es arrivée jusqu'ici…
          <br><br>
          <a href="https://wa.me/447488813781?text=Je%20viens%20de%20voir%20ton%20site%20👀" target="_blank" rel="noopener">
            <button class="btn btn-wa" type="button">💬 M'écrire sur WhatsApp</button>
          </a>
        `;
        card.style.opacity = 1;
      }, 260);
    }

    // Coeurs + roses
    function createFloating(){
      const el = document.createElement("div");
      el.className = "floating";
      el.style.left = Math.random()*100 + "vw";
      el.style.animationDuration = (5 + Math.random()*5) + "s";
      el.textContent = (Math.random() > 0.5) ? "❤️" : "🌹";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 10000);
    }
    setInterval(createFloating, 400);

    // start
    loadPage();
  </script>
</body>
</html>
